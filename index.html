<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Ekpani — एकपानी</title>
<meta name="description" content="Ekpani (एकपानी) — one leaf. A small, quiet studio. One plant, many leaves; each its own. Tools and spaces made deliberately." />
<link rel="icon" href="favicon.svg" type="image/svg+xml" />
<meta name="theme-color" content="#F3EFE6" />

<!-- Open Graph -->
<meta property="og:title" content="Ekpani — एकपानी" />
<meta property="og:description" content="One leaf. A small, quiet studio. One plant, many leaves — each its own." />
<meta property="og:type" content="website" />
<meta property="og:url" content="https://ekpani.com" />

<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Halant:wght@400;700&family=Nunito:wght@400;600;700&display=swap" rel="stylesheet" />
<style>
  :root{
    --sage:#8C9A82;
    --eucalyptus:#54624E;
    --paper:#F3EFE6;
    --charcoal:#23271F;
    --river:#8FA3A8;
    --line:#D8D0BF;
    --muted:#9AA08E;
    --serif:"DM Serif Display", Georgia, serif;
    --deva:"Halant", serif;
    --body:"Nunito", system-ui, sans-serif;
    --mono:ui-monospace, "SF Mono", Menlo, monospace;
  }
  *{box-sizing:border-box;}
  html,body{height:100%;}
  body{
    margin:0; background:var(--paper); color:var(--charcoal);
    font-family:var(--body); -webkit-font-smoothing:antialiased; text-rendering:optimizeLegibility;
    min-height:100svh; display:flex; flex-direction:column;
  }
  main{
    flex:1 0 auto; display:flex; flex-direction:column;
    align-items:center; justify-content:center; text-align:center;
    padding:56px 26px 32px;
  }
  .stage{
    display:flex; flex-direction:column; align-items:center;
    opacity:0; transform:translateY(10px);
    animation:rise 1.5s cubic-bezier(.2,.7,.2,1) .12s forwards;
  }
  @keyframes rise{to{opacity:1; transform:none;}}
  @media (prefers-reduced-motion:reduce){ .stage{animation:none; opacity:1; transform:none;} }

  /* ---- hero ---- */
  .mark{ width:96px; height:88px; color:var(--eucalyptus); margin-bottom:30px; }
  .wordmark{
    font-family:var(--deva); font-weight:700; color:var(--eucalyptus);
    font-size:clamp(64px,12vw,124px); line-height:.9; letter-spacing:.01em; margin:0;
  }
  .latin{
    font-family:var(--serif); color:var(--sage);
    font-size:clamp(15px,2.6vw,20px); letter-spacing:.4em; text-transform:uppercase;
    margin:20px 0 0; padding-left:.4em;
  }
  .thesis{
    font-family:var(--serif); font-style:italic; color:var(--charcoal);
    font-size:clamp(16px,2.1vw,21px); line-height:1.45;
    max-width:30ch; margin:34px 0 0; opacity:.82;
  }

  /* ---- divider ---- */
  .rule{ width:42px; height:1px; background:var(--line); margin:46px 0 44px; }

  /* ---- roster ---- */
  .roster{
    display:flex; gap:clamp(56px,12vw,108px); align-items:flex-start;
    text-align:left;
  }
  .group .eyebrow{
    font-family:var(--mono); font-size:11.5px; letter-spacing:.22em; text-transform:uppercase;
    color:var(--sage); margin:0 0 18px;
  }
  .group ul{ list-style:none; margin:0; padding:0; }
  .group li{ margin:0 0 11px; line-height:1.1; }
  .group li:last-child{ margin-bottom:0; }
  .group a, .group .soon{
    font-family:var(--serif); font-size:clamp(19px,2.4vw,23px); line-height:1.2;
  }
  .group a{
    color:var(--eucalyptus); text-decoration:none;
    border-bottom:1px solid transparent; padding-bottom:1px; transition:border-color .28s ease, color .28s ease;
  }
  .group a:hover{ border-bottom-color:var(--sage); }
  .group .soon{
    color:var(--muted); cursor:default; position:relative;
  }
  .group .soon::after{
    content:"soon"; font-family:var(--mono); font-style:normal;
    font-size:9.5px; letter-spacing:.14em; text-transform:uppercase;
    color:var(--sage); opacity:.7; vertical-align:super; margin-left:7px;
  }

  /* ---- footer ---- */
  footer{
    flex-shrink:0; text-align:center; padding:0 26px 38px;
    font-family:var(--mono); font-size:11.5px; letter-spacing:.16em; text-transform:uppercase;
    color:var(--sage); line-height:2.2;
  }
  footer a{ color:var(--sage); text-decoration:none; border-bottom:1px solid transparent; transition:border-color .25s ease, color .25s ease; }
  footer a:hover{ border-bottom-color:var(--sage); color:var(--eucalyptus); }
  footer .sep{ opacity:.45; margin:0 .6em; }
  footer .line2{ display:block; color:var(--muted); }
  footer .line2 a{ color:var(--muted); }

  @media (max-width:560px){
    .roster{ flex-direction:row; gap:48px; justify-content:center; }
    footer .sep{ display:none; }
    footer span.email{ display:block; }
  }
</style>
</head>
<body>
  <main>
    <div class="stage">
      <div class="leaf mark" data-variant="full" data-sw="4.5" data-vsw="2.6"></div>
      <h1 class="wordmark" lang="kok">एकपानी</h1>
      <p class="latin">Ekpani</p>
      <p class="thesis">One plant, many leaves&nbsp;— each its own.</p>

      <div class="rule" role="presentation"></div>

      <nav class="roster" aria-label="What grows here">
        <div class="group">
          <p class="eyebrow">Tools</p>
          <ul>
            <li><a href="https://timebase.cc" target="_blank" rel="noopener">Timebase</a></li>
            <li><a href="https://shio.sh" target="_blank" rel="noopener">Shio</a></li>
            <li><a href="https://medivalent.com" target="_blank" rel="noopener">Medivalent</a></li>
            <li><a href="https://pasture.sh" target="_blank" rel="noopener">Pasture</a></li>
            <li><span class="soon">Infer</span></li>
          </ul>
        </div>
        <div class="group">
          <p class="eyebrow">Spaces</p>
          <ul>
            <li><span class="soon">Stem</span></li>
            <li><a href="https://samooh.com" target="_blank" rel="noopener">Samooh</a></li>
            <li><span class="soon">Dhuni</span></li>
          </ul>
        </div>
      </nav>
    </div>
  </main>

  <footer>
    <span class="email"><a href="mailto:hi@ekpani.com">hi@ekpani.com</a></span>
    <span class="sep">·</span>
    <span class="line2">a tiny studio by <a href="https://amrith.co" target="_blank" rel="noopener">amrith</a></span>
  </footer>

  <script src="ekpani-leaf.js"></script>
</body>
</html>
